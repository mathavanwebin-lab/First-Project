<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="tictactoe.css">
</head>
<body>
    <main>
    <header id="header">
        <div class="player player-active" id="xplayer"
        onclick="chooseplayer('X')">X</div>
        <h3 id="title">CHOOSE</h3>
        <div class="player" id="oplayer" onclick="chooseplayer('O')">O</div>
    </header>
    <div id="board">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
         </div>

         <button id="restartBtn">RESTART</button>
    </main>
    <script src="tictactoe.js"></script>
</body>
</html>
